<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tierlist Maker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
      color: #e0e0e0;
    }

    #tierlist {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 960px;
    }

    .tier-row {
      display: flex;
      align-items: stretch;
      min-height: 80px;
      border: 1px solid #333;
    }

    .tier-label {
      position: relative;
      width: 80px;
      min-width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      user-select: none;
      cursor: pointer;
    }

    .tier-color-input {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .tier-label-text {
      cursor: text;
    }

    .tier-label-input {
      width: 68px;
      background: transparent;
      border: none;
      border-bottom: 2px solid #111;
      color: #111;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      padding: 0;
    }

    .tier-controls {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      padding: 4px;
      background: #222;
      border-left: 1px solid #333;
    }

    .tier-control-btn {
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 2px;
      line-height: 1.4;
    }

    .tier-control-btn:hover:not(:disabled) {
      background: #444;
      color: #fff;
    }

    .tier-control-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #add-tier-btn {
      margin-top: 8px;
      padding: 6px 14px;
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 3px;
      max-width: 960px;
      width: 100%;
    }

    #add-tier-btn:hover {
      background: #444;
      color: #fff;
    }

    .tier-items {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: #2a2a2a;
      min-height: 80px;
    }

    .drop-indicator {
      width: 3px;
      align-self: stretch;
      min-height: 40px;
      background: #4a9eff;
      border-radius: 2px;
      pointer-events: none;
      flex-shrink: 0;
    }

    .tier-items.drag-over {
      background: #3a3a3a;
      outline: 2px dashed #888;
      outline-offset: -2px;
    }

    .tier-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 72px;
      background: #3d3d3d;
      border: 1px solid #555;
      font-size: 0.75rem;
      text-align: center;
      padding: 4px;
      cursor: grab;
      overflow: hidden;
      word-break: break-word;
    }

    .tier-item[style*="background-image"] {
      background-origin: border-box;
      background-repeat: no-repeat;
    }

    .item-name-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 0.65rem;
      text-align: center;
      padding: 1px 2px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #item-creation-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    #item-creation-controls button {
      padding: 5px 12px;
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      cursor: pointer;
      font-size: 0.82rem;
      border-radius: 3px;
    }

    #item-creation-controls button:hover {
      background: #444;
      color: #fff;
    }

    #text-item-input-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .text-item-input {
      background: #2d2d2d;
      border: 1px solid #555;
      color: #f0f0f0;
      padding: 4px 8px;
      font-size: 0.82rem;
      border-radius: 3px;
      outline: none;
    }

    .text-item-input:focus {
      border-color: #888;
    }

    #unranked-section {
      margin-top: 20px;
      max-width: 960px;
    }

    #unranked-section h2 {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }

    #unranked-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      min-height: 80px;
      background: #222;
      border: 1px solid #333;
    }

    #unranked-pool.drag-over {
      background: #2d2d2d;
      outline: 2px dashed #888;
      outline-offset: -2px;
    }

    #toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      max-width: 960px;
    }

    #toolbar button {
      padding: 6px 14px;
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 3px;
    }

    #toolbar button:hover {
      background: #444;
      color: #fff;
    }

    #toolbar #clear-btn {
      background: #7a1f1f;
      border-color: #9a2f2f;
      color: #ffcccc;
      margin-left: auto;
    }

    #toolbar #clear-btn:hover {
      background: #9a2020;
      border-color: #c03030;
      color: #fff;
    }

    .image-adjust-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-adjust-dialog {
      position: relative;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 432px;
    }

.image-adjust-preview {
      width: 400px;
      height: 360px;
      position: relative;
      overflow: hidden;
      cursor: grab;
      background-color: #111;
      background-origin: border-box;
      border: 1px solid #333;
      border-radius: 3px;
      user-select: none;
    }

    .image-adjust-preview.dragging {
      cursor: grabbing;
    }


    .image-adjust-zoom {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .image-adjust-zoom label {
      font-size: 0.82rem;
      color: #aaa;
      min-width: 34px;
    }

    .image-adjust-zoom input[type=range] {
      flex: 1;
      accent-color: #4a7fff;
    }

    .image-adjust-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .image-adjust-buttons button {
      padding: 6px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .image-adjust-btn-cancel {
      background: #333;
      border: 1px solid #555;
      color: #ccc;
    }

    .image-adjust-btn-cancel:hover {
      background: #444;
      color: #fff;
    }

    .image-adjust-btn-confirm {
      background: #4a7fff;
      border: 1px solid #3a6fee;
      color: #fff;
    }

    .image-adjust-btn-confirm:hover {
      background: #5a8fff;
    }

    #version-footer {
      position: fixed;
      bottom: 12px;
      right: 16px;
      text-align: right;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }

    #version-footer a {
      color: #4a9eff;
      text-decoration: none;
      pointer-events: all;
    }

    #version-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Tierlist Maker</h1>
  <div id="toolbar">
    <button id="save-btn">Save</button>
    <button id="load-btn">Load</button>
    <button id="clear-btn">Clear</button>
  </div>
  <div id="tierlist"></div>
  <section id="unranked-section">
    <h2>Unranked</h2>
    <div id="unranked-pool"></div>
  </section>
  <div id="version-footer">
    <a href="https://github.com/Warlander/TierlistMaker/blob/master/CHANGELOG.md" target="_blank" rel="noopener">Changelog</a><br>
    <span id="version-string">Version</span>
  </div>
  <script type="module" src="index.js"></script>
</body>
</html>
